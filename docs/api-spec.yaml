  /health:
    get:
      tags:
      - Health
      summary: Health Check
      description: 'Health check endpoint.


        :param request: The incoming request (required for rate limiting).

        :returns: Health status.'
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Check Health Get
components:
  schemas:
    ApiCreate:
      properties:
        namespaceId:
          type: string
          format: uuid
          title: Namespaceid
          examples:
          - 00000000-0000-0000-0000-000000000002
        title:
          type: string
          title: Title
          examples:
          - User Management API
        version:
          type: string
          title: Version
          examples:
          - 1.0.0
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          default: ''
          examples:
          - API for managing user accounts
        baseUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Baseurl
          default: ''
          examples:
          - /api/v1
        serverUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Serverurl
          default: ''
          examples:
          - https://api.example.com
      type: object
      required:
      - namespaceId
      - title
      - version
      title: ApiCreate
      description: 'Request schema for creating an API.


        :ivar namespace_id: Namespace this API belongs to.

        :ivar title: API title for OpenAPI spec.

        :ivar version: Semantic version string.

        :ivar description: API description.

        :ivar base_url: Base path for all endpoints.

        :ivar server_url: Full server URL.'
    ApiEndpointCreate:
      properties:
        apiId:
          type: string
          format: uuid
          title: Apiid
          examples:
          - 00000000-0000-0000-0005-000000000001
        method:
          type: string
          enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          title: Method
          examples:
          - GET
        path:
          type: string
          title: Path
          examples:
          - /users/{user_id}
        description:
          type: string
          title: Description
          examples:
          - Get user by ID
        tagName:
          anyOf:
          - type: string
          - type: 'null'
          title: Tagname
          examples:
          - Users
        pathParams:
          items:
            $ref: '#/components/schemas/PathParamSchema'
