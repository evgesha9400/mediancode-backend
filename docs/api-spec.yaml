openapi: 3.1.0
info:
  title: Median Code API
  description: Production-ready FastAPI code generation and API entity management
    with Clerk JWT authentication.
  version: 1.0.0
paths:
  /v1/namespaces:
    get:
      tags:
      - Namespaces
      summary: List all namespaces
      description: Retrieve all namespaces accessible to the authenticated user.
      operationId: list_namespaces_v1_namespaces_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/NamespaceResponse'
                type: array
                title: Response List Namespaces V1 Namespaces Get
      security:
      - HTTPBearer: []
    post:
      tags:
      - Namespaces
      summary: Create a new namespace
      description: Create a new namespace for organizing API entities.
      operationId: create_namespace_v1_namespaces_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v1/namespaces/{namespace_id}:
    get:
      tags:
      - Namespaces
      summary: Get namespace by ID
      description: Retrieve a specific namespace by its ID.
      operationId: get_namespace_v1_namespaces__namespace_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: namespace_id
        in: path
        required: true
        schema:
          type: string
          title: Namespace Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Namespaces
      summary: Update namespace
      description: Update an existing namespace.
      operationId: update_namespace_v1_namespaces__namespace_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: namespace_id
        in: path
        required: true
        schema:
          type: string
          title: Namespace Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Namespaces
      summary: Delete namespace
      description: Delete a namespace. Only allowed if the namespace has no entities.
      operationId: delete_namespace_v1_namespaces__namespace_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: namespace_id
        in: path
        required: true
        schema:
          type: string
          title: Namespace Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/apis:
    get:
      tags:
      - APIs
      summary: List all APIs
      description: Retrieve all API definitions accessible to the authenticated user.
      operationId: list_apis_v1_apis_get
      security:
      - HTTPBearer: []
      parameters:
      - name: namespace_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiResponse'
                title: Response List Apis V1 Apis Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - APIs
      summary: Create a new API
      description: Create a new API definition.
      operationId: create_api_v1_apis_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/apis/{api_id}:
    get:
      tags:
      - APIs
      summary: Get API by ID
      description: Retrieve a specific API definition by its ID.
      operationId: get_api_v1_apis__api_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: api_id
        in: path
        required: true
        schema:
          type: string
          title: Api Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - APIs
      summary: Update API
      description: Update an existing API definition.
      operationId: update_api_v1_apis__api_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: api_id
        in: path
        required: true
        schema:
          type: string
          title: Api Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - APIs
      summary: Delete API
      description: Delete an API definition. This cascades to endpoints.
      operationId: delete_api_v1_apis__api_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: api_id
        in: path
        required: true
        schema:
          type: string
          title: Api Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/apis/{api_id}/generate:
    post:
      tags:
      - APIs
      summary: Generate FastAPI application
      description: Generates a complete FastAPI application for the specified API.
      operationId: generate_api_code_v1_apis__api_id__generate_post
      security:
      - HTTPBearer: []
      parameters:
      - name: api_id
        in: path
        required: true
        schema:
          type: string
          title: Api Id
      responses:
        '200':
          description: Successfully generated FastAPI application
          content:
            application/json:
              schema: {}
            application/zip:
              schema:
                type: string
                format: binary
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/types:
    get:
      tags:
      - Types
      summary: List all types
      description: Retrieve all type definitions accessible to the authenticated user.
