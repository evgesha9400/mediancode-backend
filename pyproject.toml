[project]
name = "api-craft"
version = "0.1.0"
description = "FastAPI Generator"
authors = [
    {name = "Evgeny Aleshin",email = "evgeny@aleshingroup.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic (>=2.11.9,<3.0.0)",
    "jinja2 (>=3.1.6,<4.0.0)"
]

[dependency-groups]
dev = [
    "black (>=25.9.0,<26.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "api_craft", from = "src" }]