# tests/specs/orders_api_db.yaml
name: OrdersDbApi
version: "0.1.0"
description: Orders API with FK relationships

objects:
  - name: Order
    fields:
      - name: id
        type: int
        pk: true
      - name: status
        type: str
        validators:
          - name: max_length
            params: { value: 50 }

  - name: OrderItem
    fields:
      - name: id
        type: int
        pk: true
      - name: order_id
        type: int
        fk: Order
        on_delete: cascade
      - name: product_name
        type: str
        validators:
          - name: max_length
            params: { value: 200 }
      - name: quantity
        type: int
        validators:
          - name: ge
            params: { value: 1 }

  - name: CreateOrderRequest
    fields:
      - name: status
        type: str

endpoints:
  - name: GetOrders
    path: /orders
    method: GET
    response: Order
    response_shape: list

  - name: CreateOrder
    path: /orders
    method: POST
    response: Order
    request: CreateOrderRequest

config:
  database:
    enabled: true
