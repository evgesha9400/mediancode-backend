name: ShopApi
version: "1.0.0"
author: Median Code
description: Complete online shop API

tags:
  - name: Products
  - name: Customers

objects:
  - name: Product
    description: Shop product
    fields:
      - name: name
        type: str
        validators:
          - name: min_length
            params: { value: 1 }
          - name: max_length
            params: { value: 150 }
        field_validators:
          - function_name: trim_name
            mode: before
            function_body: "        v = v.strip()\n        return v"
          - function_name: normalize_whitespace_name
            mode: before
            function_body: "        import re\n        v = re.sub(r'\\s+', ' ', v).strip()\n        return v"
      - name: sku
        type: str
        validators:
          - name: pattern
            params: { value: "^[A-Z]{2}-\\d{4}$" }
        field_validators:
          - function_name: normalize_case_sku
            mode: before
            function_body: "        v = v.upper()\n        return v"
      - name: price
        type: decimal.Decimal
        validators:
          - name: gt
            params: { value: 0 }
        field_validators:
          - function_name: round_decimal_price
            mode: after
            function_body: "        v = round(v, 2)\n        return v"
      - name: sale_price
        type: decimal.Decimal
        nullable: true
        validators:
          - name: ge
            params: { value: 0 }
      - name: sale_end_date
        type: datetime.date
        nullable: true
      - name: weight
        type: float
        validators:
          - name: ge
            params: { value: 0 }
          - name: lt
            params: { value: 1000 }
        field_validators:
          - function_name: clamp_weight
            mode: before
            function_body: "        v = max(0, min(float(v), 1000))\n        return v"
      - name: quantity
        type: int
        validators:
          - name: ge
            params: { value: 0 }
      - name: min_order_quantity
        type: int
        validators:
          - name: ge
            params: { value: 1 }
      - name: max_order_quantity
        type: int
        nullable: true
        validators:
          - name: le
            params: { value: 1000 }
      - name: discount_percent
        type: int
        nullable: true
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100 }
          - name: multiple_of
            params: { value: 5 }
      - name: discount_amount
        type: decimal.Decimal
        nullable: true
        validators:
          - name: ge
            params: { value: 0 }
      - name: in_stock
        type: bool
      - name: product_url
        type: HttpUrl
      - name: release_date
        type: datetime.date
      - name: created_at
        type: datetime.datetime
      - name: tracking_id
        type: uuid.UUID
        pk: true
        exposure: read_only
    model_validators:
      - function_name: validate_order_quantity_range
        mode: after
        function_body: "        if self.max_order_quantity is not None and self.min_order_quantity >= self.max_order_quantity:\n            raise ValueError('min_order_quantity must be less than max_order_quantity')\n        return self"
      - function_name: validate_discount_exclusivity
        mode: after
        function_body: "        if self.discount_percent is not None and self.discount_amount is not None:\n            raise ValueError('Cannot have both discount_percent and discount_amount')\n        return self"
      - function_name: validate_sale_fields
        mode: after
        function_body: "        sale_fields = [self.sale_price, self.sale_end_date]\n        filled = [f for f in sale_fields if f is not None]\n        if 0 < len(filled) < len(sale_fields):\n            raise ValueError('All or none of sale fields (sale_price, sale_end_date) must be provided')\n        return self"
      - function_name: validate_discount_requires_sale
        mode: after
        function_body: "        if self.discount_percent is not None and self.sale_price is None:\n            raise ValueError('discount_percent requires sale_price to be set')\n        return self"

  - name: Customer
    description: Shop customer
    fields:
      - name: customer_id
        type: int
        pk: true
        exposure: read_only
      - name: customer_name
        type: str
        validators:
          - name: min_length
            params: { value: 1 }
          - name: max_length
            params: { value: 100 }
        field_validators:
          - function_name: trim_customer_name
            mode: before
            function_body: "        v = v.strip()\n        return v"
          - function_name: normalize_case_customer_name
            mode: before
            function_body: "        v = v.title()\n        return v"
          - function_name: trim_to_length_customer_name
            mode: after
            function_body: "        v = v[:100]\n        return v"
      - name: email
        type: EmailStr
        nullable: true
      - name: phone
        type: str
        nullable: true
        validators:
          - name: min_length
            params: { value: 7 }
          - name: max_length
            params: { value: 15 }
      - name: date_of_birth
        type: datetime.date
      - name: last_login_time
        type: datetime.time
      - name: is_active
        type: bool
      - name: registered_at
        type: datetime.datetime
    model_validators:
      - function_name: validate_contact_required
        mode: after
        function_body: "        if self.email is None and self.phone is None:\n            raise ValueError('At least one of email or phone must be provided')\n        return self"

endpoints:
  - name: ListProducts
    path: /products
    method: GET
    response: Product
    tag: Products
    description: List all products
    use_envelope: false
    response_shape: list

  - name: GetProduct
    path: /products/{tracking_id}
    method: GET
    response: Product
    tag: Products
    description: Get product by tracking ID
    use_envelope: false
    response_shape: object
    path_params:
      - name: tracking_id
        type: uuid.UUID

  - name: CreateProduct
    path: /products
    method: POST
    request: Product
    response: Product
    tag: Products
    description: Create a product
    use_envelope: false
    response_shape: object

  - name: UpdateProduct
    path: /items/{tracking_id}
    method: PUT
    request: Product
    response: Product
    tag: Products
    description: Update a product
    use_envelope: false
    response_shape: object
    path_params:
      - name: tracking_id
        type: uuid.UUID

  - name: DeleteProduct
    path: /products/{tracking_id}
    method: DELETE
    tag: Products
    description: Delete a product
    use_envelope: false
    response_shape: object
    path_params:
      - name: tracking_id
        type: uuid.UUID

  - name: ListCustomers
    path: /customers
    method: GET
    response: Customer
    tag: Customers
    description: List all customers
    use_envelope: false
    response_shape: list

  - name: CreateCustomer
    path: /customers
    method: POST
    request: Customer
    response: Customer
    tag: Customers
    description: Create a customer
    use_envelope: false
    response_shape: object

  - name: GetCustomer
    path: /customers/{email}
    method: GET
    response: Customer
    tag: Customers
    description: Get customer by email
    use_envelope: false
    response_shape: object
    path_params:
      - name: email
        type: EmailStr

  - name: UpdateCustomer
    path: /customers/{email}
    method: PATCH
    request: Customer
    response: Customer
    tag: Customers
    description: Update a customer by email
    use_envelope: false
    response_shape: object
    path_params:
      - name: email
        type: EmailStr

config:
  healthcheck: /healthcheck
  response_placeholders: false
  database:
    enabled: true
