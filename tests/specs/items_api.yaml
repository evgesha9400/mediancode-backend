name: ItemsApi
version: "0.1.0"
author: Median Code
description: E-commerce Items API with comprehensive validation

tags:
  - name: Items
    description: Item management operations

objects:
  # Response object for a single item with all field types and validators
  - name: Item
    description: Product item with validated fields
    fields:
      - name: id
        type: int
        nullable: false
        description: Unique item identifier
        validators:
          - name: ge
            params: { value: 1 }

      - name: sku
        type: str
        nullable: false
        description: Stock keeping unit (alphanumeric code)
        validators:
          - name: min_length
            params: { value: 3 }
          - name: max_length
            params: { value: 20 }
          - name: pattern
            params: { value: "^[A-Z0-9-]+$" }

      - name: name
        type: str
        nullable: false
        description: Item display name
        validators:
          - name: min_length
            params: { value: 1 }
          - name: max_length
            params: { value: 100 }

      - name: description
        type: str
        nullable: true
        description: Detailed item description
        validators:
          - name: max_length
            params: { value: 1000 }

      - name: price
        type: float
        nullable: false
        description: Item price in dollars (must be positive, max 1M)
        validators:
          - name: gt
            params: { value: 0 }
          - name: le
            params: { value: 1000000 }

      - name: quantity
        type: int
        nullable: false
        description: Available stock quantity
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100000 }

      - name: discount_percent
        type: int
        nullable: true
        description: Discount percentage (0-100, multiples of 5)
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100 }
          - name: multiple_of
            params: { value: 5 }

      - name: rating
        type: float
        nullable: true
        description: Average customer rating (0.0 to 5.0)
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 5 }

  # List response wrapper
  - name: ItemList
    description: Response containing a list of items
    fields:
      - name: items
        type: List[Item]
        nullable: false
        description: List of item objects

      - name: total
        type: int
        nullable: false
        description: Total number of items available
        validators:
          - name: ge
            params: { value: 0 }

  # Request object for creating items - tests request body validation
  - name: CreateItemRequest
    description: Request body for creating a new item
    fields:
      - name: sku
        type: str
        nullable: false
        description: Stock keeping unit
        validators:
          - name: min_length
            params: { value: 3 }
          - name: max_length
            params: { value: 20 }
          - name: pattern
            params: { value: "^[A-Z0-9-]+$" }

      - name: name
        type: str
        nullable: false
        description: Item name
        validators:
          - name: min_length
            params: { value: 1 }
          - name: max_length
            params: { value: 100 }

      - name: description
        type: str
        nullable: true
        description: Item description
        validators:
          - name: max_length
            params: { value: 1000 }

      - name: price
        type: float
        nullable: false
        description: Item price
        validators:
          - name: gt
            params: { value: 0 }
          - name: le
            params: { value: 1000000 }

      - name: quantity
        type: int
        nullable: false
        description: Initial stock quantity
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100000 }

      - name: discount_percent
        type: int
        nullable: true
        description: Discount percentage
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100 }
          - name: multiple_of
            params: { value: 5 }

  # Request object for updating items
  - name: UpdateItemRequest
    description: Request body for updating an existing item
    fields:
      - name: name
        type: str
        nullable: true
        description: New item name
        validators:
          - name: min_length
            params: { value: 1 }
          - name: max_length
            params: { value: 100 }

      - name: description
        type: str
        nullable: true
        description: New item description
        validators:
          - name: max_length
            params: { value: 1000 }

      - name: price
        type: float
        nullable: true
        description: New price
        validators:
          - name: gt
            params: { value: 0 }
          - name: le
            params: { value: 1000000 }

      - name: quantity
        type: int
        nullable: true
        description: New stock quantity
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100000 }

      - name: discount_percent
        type: int
        nullable: true
        description: New discount percentage
        validators:
          - name: ge
            params: { value: 0 }
          - name: le
            params: { value: 100 }
          - name: multiple_of
            params: { value: 5 }

endpoints:
  - name: GetItem
    path: /items/{item_id}
    method: GET
    tag: Items
    description: Retrieve a single item by its ID
    response: Item
    response_shape: object
    use_envelope: true
    path_params:
      - name: item_id
        type: int
        description: Unique identifier of the item to retrieve

  - name: GetItems
    path: /items
    method: GET
    tag: Items
    description: List all items with optional pagination
    response: ItemList
    response_shape: object
    use_envelope: true
    query_params:
      - name: limit
        type: int
        optional: true
        description: Maximum number of items to return (1-100)
      - name: offset
        type: int
        optional: true
        description: Number of items to skip for pagination
      - name: min_price
        type: float
        optional: true
        description: Filter by minimum price
      - name: max_price
        type: float
        optional: true
        description: Filter by maximum price
      - name: search
        type: str
        optional: true
        description: Search term for name/description

  - name: CreateItem
    path: /items
    method: POST
    tag: Items
    description: Create a new item
    response: Item
    request: CreateItemRequest
    response_shape: object
    use_envelope: true

  - name: UpdateItem
    path: /items/{item_id}
    method: PUT
    tag: Items
    description: Update an existing item
    response: Item
    request: UpdateItemRequest
    response_shape: object
    use_envelope: true
    path_params:
      - name: item_id
        type: int
        description: Unique identifier of the item to update

  - name: DeleteItem
    path: /items/{item_id}
    method: DELETE
    tag: Items
    description: Delete an item by its ID
    response: Item
    response_shape: object
    use_envelope: false
    path_params:
      - name: item_id
        type: int
        description: Unique identifier of the item to delete

config:
  healthcheck: /healthcheck
