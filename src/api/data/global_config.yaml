# Global types and validators configuration
# These are read-only, built-in definitions available to all users

types:
  - name: str
    category: primitive
    pythonType: str
    description: String type for text data
    validatorCategories:
      - string

  - name: int
    category: primitive
    pythonType: int
    description: Integer type for whole numbers
    validatorCategories:
      - numeric

  - name: float
    category: primitive
    pythonType: float
    description: Floating point type for decimal numbers
    validatorCategories:
      - numeric

  - name: bool
    category: primitive
    pythonType: bool
    description: Boolean type for true/false values
    validatorCategories: []

  - name: datetime
    category: primitive
    pythonType: datetime.datetime
    description: Date and time type
    validatorCategories: []

  - name: uuid
    category: abstract
    pythonType: uuid.UUID
    description: Universally unique identifier
    validatorCategories:
      - string

validators:
  # String validators
  - name: max_length
    namespaceId: namespace-global
    type: string
    description: Validates that string length does not exceed maximum
    category: inline
    parameterType: int
    exampleUsage: "Field(max_length=255)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#string-constraints

  - name: min_length
    namespaceId: namespace-global
    type: string
    description: Validates that string length is at least minimum
    category: inline
    parameterType: int
    exampleUsage: "Field(min_length=1)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#string-constraints

  - name: pattern
    namespaceId: namespace-global
    type: string
    description: Validates string matches a regular expression pattern
    category: inline
    parameterType: str
    exampleUsage: "Field(pattern=r'^[a-z]+$')"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#string-constraints

  - name: email_format
    namespaceId: namespace-global
    type: string
    description: Validates email format using EmailStr type
    category: inline
    parameterType: None
    exampleUsage: "EmailStr"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/api/networks/#pydantic.networks.EmailStr

  - name: url_format
    namespaceId: namespace-global
    type: string
    description: Validates URL format using HttpUrl type
    category: inline
    parameterType: None
    exampleUsage: "HttpUrl"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/api/networks/#pydantic.networks.HttpUrl

  # Numeric validators
  - name: gt
    namespaceId: namespace-global
    type: numeric
    description: Validates that number is greater than specified value
    category: inline
    parameterType: number
    exampleUsage: "Field(gt=0)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#numeric-constraints

  - name: ge
    namespaceId: namespace-global
    type: numeric
    description: Validates that number is greater than or equal to specified value
    category: inline
    parameterType: number
    exampleUsage: "Field(ge=0)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#numeric-constraints

  - name: lt
    namespaceId: namespace-global
    type: numeric
    description: Validates that number is less than specified value
    category: inline
    parameterType: number
    exampleUsage: "Field(lt=100)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#numeric-constraints

  - name: le
    namespaceId: namespace-global
    type: numeric
    description: Validates that number is less than or equal to specified value
    category: inline
    parameterType: number
    exampleUsage: "Field(le=100)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#numeric-constraints

  - name: multiple_of
    namespaceId: namespace-global
    type: numeric
    description: Validates that number is a multiple of specified value
    category: inline
    parameterType: number
    exampleUsage: "Field(multiple_of=5)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#numeric-constraints

  # Collection validators
  - name: min_items
    namespaceId: namespace-global
    type: collection
    description: Validates that collection has at least minimum number of items
    category: inline
    parameterType: int
    exampleUsage: "Field(min_length=1)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#string-constraints

  - name: max_items
    namespaceId: namespace-global
    type: collection
    description: Validates that collection has at most maximum number of items
    category: inline
    parameterType: int
    exampleUsage: "Field(max_length=100)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/fields/#string-constraints

  - name: unique_items
    namespaceId: namespace-global
    type: collection
    description: Validates that all items in collection are unique
    category: custom
    parameterType: None
    exampleUsage: "@field_validator(...)"
    pydanticDocsUrl: https://docs.pydantic.dev/latest/concepts/validators/
